<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroCode — Müəllim Paneli</title>
<style>
  :root{
    --bg:#0B0F19;--bg2:#11162199;--b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);
    --glass:rgba(255,255,255,.06);--t1:#fff;--t2:#cbd5e1;--t3:#94a3b8;--t4:#64748b;
    --indigo:#6366f1;--grad:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%);
    --r:22px;--r2:16px;--r3:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--t1);font-family:-apple-system,Inter,Segoe UI,sans-serif;
    min-height:100vh;padding:24px 16px 60px;
  }
  .wrap{max-width:920px;margin:0 auto}
  h1{font-size:24px;font-weight:800;margin-bottom:4px}
  .sub{font-size:13px;color:var(--t3);margin-bottom:24px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  select,button{
    background:var(--glass);border:1.5px solid var(--b2);color:var(--t1);
    border-radius:var(--r3);padding:10px 14px;font-size:13px;font-family:inherit;cursor:pointer;
  }
  button.primary{background:var(--grad);border:none;font-weight:700}
  .status{font-size:12px;color:var(--t4);margin-bottom:18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:24px}
  .card{
    background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--b);
    border-radius:var(--r2);padding:18px;
  }
  .card-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:12px}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .row-name{flex:1;font-size:12px;color:var(--t2)}
  .row-track{flex:2;height:7px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
  .row-fill{height:100%;border-radius:99px}
  .row-pct{font-size:12px;font-weight:700;width:38px;text-align:right}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;color:var(--t4);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--b)}
  td{padding:9px 10px;border-bottom:1px solid var(--b);color:var(--t2)}
  tr:hover td{background:rgba(255,255,255,.02)}
  .empty{text-align:center;padding:50px 20px;color:var(--t4)}
  .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
  .badge-good{background:rgba(5,150,105,.15);color:#059669}
  .badge-mid{background:rgba(245,158,11,.15);color:#f59e0b}
  .badge-bad{background:rgba(220,38,38,.15);color:#dc2626}
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 NeuroCode — Müəllim Paneli</h1>
  <div class="sub">Bütün şagirdlərin Firestore <code>results</code> kolleksiyasından canlı statistikası</div>

  <div class="toolbar">
    <select id="class-filter"><option value="">Bütün siniflər</option></select>
    <button class="primary" id="refresh-btn">🔄 Yenilə</button>
  </div>
  <div class="status" id="status">Yüklənir...</div>

  <div class="grid">
    <div class="card">
      <div class="card-title">🎓 Sinif üzrə fənn performansı</div>
      <div id="subject-bars"></div>
    </div>
    <div class="card">
      <div class="card-title">⚠️ Ən zəif 5 fənn (sinif üzrə)</div>
      <div id="weak-bars"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">👤 Şagird üzrə xülasə</div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Şagird</th><th>Sinif</th><th>Cavab sayı</th><th>Doğruluq %</th><th>Zəif fənn</th></tr></thead>
        <tbody id="student-rows"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ⚠️ Eyni konfiqurasiya NeuroCode.html-dəki ilə UYĞUN olmalıdır.
  const firebaseConfig = {
    apiKey:  "AIzaSyCMXKq7munnhpWC0We6R7oZApv3X9ZjwqY"",
    authDomain: "neurocode-class.firebaseapp.com",
    projectId: "neurocode-class",
    storageBucket: "neurocode-class.firebasestorage.app",
    messagingSenderId: "330789249880",
    appId: "1:330789249880:web:ce1b8fb5c695a4581d3b2d"
  };

  const SUBJECT_LABELS={
    az:'Azərbaycan dili',lit:'Ədəbiyyat',math:'Riyaziyyat',en:'İngilis dili',
    hist:'Tarix',bio:'Biologiya',chem:'Kimya',phys:'Fizika',logic:'Məntiq',
    info:'İnformatika',geo:'Coğrafiya',fonetika:'Fonetika',morph:'Morfologiya',
    syntax:'Sintaksis',leksik:'Leksikologiya',orfq:'Orfoqrafiya',punct:'Durğu işarələri',
    curric:'Kurikulum',assess:'Qiymətləndirmə',pedag:'Pedaqogika',method:'Metodika',
    sit:'Situasiya analizi',psixo:'Psixologiya',qiymet:'Qiymətləndirmə sistemləri',
    telim:'Tədris texnologiyaları',read:'Oxu savadlılığı',fin:'Maliyyə savadlılığı',
    digital:'Rəqəmsal savadlılıq',environ:'Ekoloji savadlılıq',civic:'Vətəndaşlıq',
    collab:'Əməkdaşlıq',memory:'Yaddaş',attention:'Diqqət',problem:'Problem həlli',
    dx:'Disleksiya dəstəyi',dc:'Diskalkuli dəstəyi',executive:'İcraedici funksiyalar',
    creative:'Yaradıcı düşüncə',emotional:'Emosional intellekt',
  };
  function labelFor(slug){ return SUBJECT_LABELS[slug] || slug; }
  function pctColor(p){ return p>=75?'#059669':p>=50?'#f59e0b':'#dc2626'; }
  function badgeClass(p){ return p>=75?'badge-good':p>=50?'badge-mid':'badge-bad'; }

  let app, db;
  let allResults = [];

  function setStatus(msg){ document.getElementById('status').textContent = msg; }

  async function loadResults(){
    setStatus('Yüklənir...');
    try{
      const q = query(collection(db,'results'), orderBy('ts','desc'), limit(2000));
      const snap = await getDocs(q);
      allResults = snap.docs.map(d=>d.data());
      setStatus(`${allResults.length} nəticə yükləndi · son yeniləmə: ${new Date().toLocaleTimeString('az-AZ')}`);
      populateClassFilter();
      render();
    }catch(e){
      setStatus('⚠️ Yükləmə xətası: ' + e.message + ' — Firestore qaydalarını və apiKey-i yoxlayın.');
      console.error(e);
    }
  }

  function populateClassFilter(){
    const sel = document.getElementById('class-filter');
    const existing = new Set(Array.from(sel.options).map(o=>o.value));
    const classes = [...new Set(allResults.map(r=>r.className).filter(Boolean))].sort();
    classes.forEach(c=>{
      if(!existing.has(c)){
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      }
    });
  }

  function filteredResults(){
    const cls = document.getElementById('class-filter').value;
    return cls ? allResults.filter(r=>r.className===cls) : allResults;
  }

  function render(){
    const data = filteredResults();
    if(data.length===0){
      document.getElementById('subject-bars').innerHTML = '<div class="empty">Hələ məlumat yoxdur</div>';
      document.getElementById('weak-bars').innerHTML = '<div class="empty">Hələ məlumat yoxdur</div>';
      document.getElementById('student-rows').innerHTML = '<tr><td colspan="5" class="empty">Hələ məlumat yoxdur</td></tr>';
      return;
    }

    // ── Subject-level aggregation (whole filtered class) ──
    const bySubject = {};
    data.forEach(r=>{
      const s = r.subject || 'naməlum';
      if(!bySubject[s]) bySubject[s] = {done:0, correct:0};
      bySubject[s].done++;
      if(r.isCorrect) bySubject[s].correct++;
    });
    const subjectRows = Object.entries(bySubject).map(([slug,v])=>({
      slug, label:labelFor(slug), pct: Math.round(v.correct/v.done*100), done:v.done
    })).sort((a,b)=>b.pct-a.pct);

    document.getElementById('subject-bars').innerHTML = subjectRows.map(s=>`
      <div class="row">
        <span class="row-name">${s.label}</span>
        <div class="row-track"><div class="row-fill" style="width:${s.pct}%;background:${pctColor(s.pct)}"></div></div>
        <span class="row-pct" style="color:${pctColor(s.pct)}">${s.pct}%</span>
      </div>`).join('');

    const weakest = [...subjectRows].sort((a,b)=>a.pct-b.pct).slice(0,5);
    document.getElementById('weak-bars').innerHTML = weakest.length ? weakest.map(s=>`
      <div class="row">
        <span class="row-name">${s.label}</span>
        <div class="row-track"><div class="row-fill" style="width:${s.pct}%;background:${pctColor(s.pct)}"></div></div>
        <span class="row-pct" style="color:${pctColor(s.pct)}">${s.pct}%</span>
      </div>`).join('') : '<div class="empty">Kifayət qədər data yoxdur</div>';

    // ── Per-student aggregation ──
    const byStudent = {};
    data.forEach(r=>{
      const key = (r.studentName||'Naməlum') + '|' + (r.className||'');
      if(!byStudent[key]) byStudent[key] = {name:r.studentName||'Naməlum', className:r.className||'-', done:0, correct:0, subjects:{}};
      byStudent[key].done++;
      if(r.isCorrect) byStudent[key].correct++;
      const s = r.subject||'naməlum';
      if(!byStudent[key].subjects[s]) byStudent[key].subjects[s] = {done:0,correct:0};
      byStudent[key].subjects[s].done++;
      if(r.isCorrect) byStudent[key].subjects[s].correct++;
    });

    const studentRows = Object.values(byStudent).map(st=>{
      const pct = Math.round(st.correct/st.done*100);
      const weakestSubj = Object.entries(st.subjects)
        .map(([slug,v])=>({slug,pct:Math.round(v.correct/v.done*100)}))
        .sort((a,b)=>a.pct-b.pct)[0];
      return {...st, pct, weakestLabel: weakestSubj?labelFor(weakestSubj.slug):'-', weakestPct: weakestSubj?weakestSubj.pct:null};
    }).sort((a,b)=>a.pct-b.pct);

    document.getElementById('student-rows').innerHTML = studentRows.map(st=>`
      <tr>
        <td>${st.name}</td>
        <td>${st.className}</td>
        <td>${st.done}</td>
        <td><span class="badge ${badgeClass(st.pct)}">${st.pct}%</span></td>
        <td>${st.weakestLabel}${st.weakestPct!==null?' ('+st.weakestPct+'%)':''}</td>
      </tr>`).join('');
  }

  document.getElementById('class-filter').addEventListener('change', render);
  document.getElementById('refresh-btn').addEventListener('click', loadResults);

  try{
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    loadResults();
  }catch(e){
    setStatus('⚠️ Firebase başlatma xətası: ' + e.message);
  }
</script>
</body>
</html>
